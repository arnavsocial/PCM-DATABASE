<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Database 2026 - Responsive Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat&display=swap");

        body { font-family: "Montserrat", sans-serif; transition: background 0.2s linear; }

        /* Universal Scrollbar Hider to Prevent Jitter */
        .hide-scroll {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .hide-scroll::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* Dark Mode Toggle Switch */
        .checkbox { opacity: 0; position: absolute; }
        .checkbox-label {
            background-color: #111; width: 44px; height: 24px; border-radius: 50px;
            position: relative; padding: 4px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 0;
        }
        @media (min-width: 768px) {
            .checkbox-label { width: 50px; height: 26px; padding: 5px; }
        }
        .checkbox-label .ball {
            background-color: #fff; width: 18px; height: 18px; position: absolute;
            left: 2px; top: 3px; border-radius: 50%; transition: transform 0.2s linear;
        }
        @media (min-width: 768px) {
            .checkbox-label .ball { width: 22px; height: 22px; left: 2px; top: 2px; }
        }
        .checkbox:checked + .checkbox-label .ball { transform: translateX(22px); }
        @media (min-width: 768px) {
            .checkbox:checked + .checkbox-label .ball { transform: translateX(24px); }
        }

        /* Dark Mode Styling Logic */
        .dark { background-color: #292c35; color: #fff; }
        .dark .bg-white { background-color: #1e2027 !important; border-color: #3f4451 !important; color: #fff; }
        .dark .bg-gray-50 { background-color: #292c35 !important; border-color: #3f4451 !important; }
        .dark .bg-gray-100 { background-color: #22252d !important; border-color: #3f4451 !important; }
        .dark th { color: #a1a1aa !important; }
        .dark td { color: #e4e4e7 !important; border-bottom-color: #3f4451 !important; }
        .dark .text-gray-900, .dark .text-gray-800 { color: #f4f4f5 !important; }
        .dark .text-gray-600, .dark .text-gray-500 { color: #a1a1aa !important; }
        .dark .edit-input { background: #3f4451; color: white; border-color: #52525b; }
        .dark .hover\:bg-blue-50:hover { background-color: #374151 !important; }
        .dark .social-wrapper .icon { background: #3f4451; color: #fff; }

        /* Neumorphic Card Base */
        .neu-card {
            border-radius: 16px;
            background: #e0e0e0;
            box-shadow: 10px 10px 30px #bebebe, -10px -10px 30px #ffffff;
        }
        @media (min-width: 768px) {
            .neu-card { border-radius: 30px; box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff; }
        }
        .dark .neu-card {
            background: #292c35;
            box-shadow: 15px 15px 40px #1c1e24, -15px -15px 40px #363a46;
        }

        /* Animated Search Bar */
        .search-input {
            border: 2px solid transparent; width: 100%; height: 2.5em; padding-left: 0.8em;
            outline: none; overflow: hidden; background-color: #f3f3f3;
            border-radius: 10px; transition: all 0.5s; font-family: inherit;
        }
        .search-input:hover, .search-input:focus {
            border: 2px solid #4a9dec; box-shadow: 0px 0px 0px 7px rgb(74, 157, 236, 20%);
            background-color: white;
        }
        .dark .search-input { background-color: #3f4451; color: white; }
        .dark .search-input:hover, .dark .search-input:focus { background-color: #1e2027; }

        /* Segmented Options Buttons (Neumorphic Tabs) */
        .tab-btn {
            font: inherit; background-color: #f0f0f0; border: 0; color: #242424;
            font-size: 0.8rem; padding: 0.4em 0.8em; text-shadow: 0 0.0625em 0 #fff;
            box-shadow: inset 0 0.0625em 0 0 #f4f4f4, 0 0.0625em 0 0 #efefef,
                0 0.125em 0 0 #ececec, 0 0.25em 0 0 #e0e0e0, 0 0.3125em 0 0 #dedede,
                0 0.375em 0 0 #dcdcdc, 0 0.425em 0 0 #cacaca, 0 0.425em 0.5em 0 #cecece;
            transition: 0.23s ease; cursor: pointer; font-weight: bold; margin: -1px; white-space: nowrap;
        }
        @media (min-width: 768px) {
            .tab-btn { font-size: 0.95rem; padding: 0.5em 1.5em; }
        }
        .tab-btn.left { border-top-left-radius: 0.5em; border-bottom-left-radius: 0.5em; }
        .tab-btn.middle { border-radius: 0px; }
        .tab-btn.right { border-top-right-radius: 0.5em; border-bottom-right-radius: 0.5em; }
        .tab-btn:active, .tab-btn.active {
            translate: 0 0.225em; letter-spacing: 0.05em; color: skyblue;
            box-shadow: inset 0 0.03em 0 0 #f4f4f4, 0 0.03em 0 0 #efefef,
                0 0.0625em 0 0 #ececec, 0 0.125em 0 0 #e0e0e0, 0 0.125em 0 0 #dedede,
                0 0.2em 0 0 #dcdcdc, 0 0.225em 0 0 #cacaca, 0 0.225em 0.375em 0 #cecece;
        }

        /* Dark Mode Tab Overrides - matching 3D depth */
        .dark .tab-btn { 
            background-color: #3f4451; color: #d1d5db; border: none; text-shadow: none;
            box-shadow: inset 0 0.0625em 0 0 #4b5563, 0 0.0625em 0 0 #374151,
                0 0.125em 0 0 #2d3748, 0 0.25em 0 0 #1f2937, 0 0.3125em 0 0 #111827,
                0 0.375em 0 0 #0f172a, 0 0.425em 0 0 #020617, 0 0.425em 0.5em 0 #000000;
        }
        .dark .tab-btn:active, .dark .tab-btn.active { 
            color: #60a5fa; translate: 0 0.225em; background-color: #3f4451;
            box-shadow: inset 0 0.03em 0 0 #4b5563, 0 0.03em 0 0 #374151,
                0 0.0625em 0 0 #2d3748, 0 0.125em 0 0 #1f2937, 0 0.125em 0 0 #111827,
                0 0.2em 0 0 #0f172a, 0 0.225em 0 0 #020617, 0 0.225em 0.375em 0 #000000;
        }

        /* Animated Social Icons */
        .social-wrapper { display: inline-flex; list-style: none; gap: 8px; padding: 0; margin: 0; }
        @media (min-width: 768px) { .social-wrapper { gap: 12px; } }
        .social-wrapper .icon {
            position: relative; background: #fff; border-radius: 50%; padding: 6px;
            width: 28px; height: 28px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1); cursor: pointer; text-decoration: none;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55); color: #333;
        }
        @media (min-width: 768px) {
            .social-wrapper .icon { width: 35px; height: 35px; padding: 8px; }
        }
        .social-wrapper .tooltip {
            position: absolute; top: 0; font-size: 10px; background: #fff; color: #fff;
            padding: 4px 6px; border-radius: 5px; box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap; z-index: 20;
        }
        @media (min-width: 768px) { .social-wrapper .tooltip { font-size: 12px; padding: 5px 8px; } }
        .social-wrapper .icon:hover .tooltip { top: -40px; opacity: 1; visibility: visible; pointer-events: auto; }
        .social-wrapper .facebook:hover, .social-wrapper .facebook:hover .tooltip { background: #1877F2; color: #fff; }
        .social-wrapper .twitter:hover, .social-wrapper .twitter:hover .tooltip { background: #1DA1F2; color: #fff; }
        .social-wrapper .instagram:hover, .social-wrapper .instagram:hover .tooltip { background: #E4405F; color: #fff; }
        .social-wrapper .github:hover, .social-wrapper .github:hover .tooltip { background: #333; color: #fff; }

        /* Top Action Buttons (Edit/CSV) */
        .action-btn {
            display: flex; align-items: center; gap: 4px; padding: 6px 12px;
            border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem;
            transition: transform 0.2s, background 0.2s; background-color: #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        @media (min-width: 768px) {
            .action-btn { padding: 8px 16px; font-size: 1rem; gap: 6px; }
        }
        .action-btn:hover { transform: scale(1.05); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
        @media (min-width: 768px) { .action-btn svg { width: 18px; height: 18px; } }
        .action-btn.edit { background-color: #f59e0b; color: #fff; }
        .action-btn.download { background-color: #10b981; }

        /* Uiverse Apply Now Button */
        .apply-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            padding: 6px 10px; border-radius: 8px; background-color: #2563eb; 
            color: white; font-weight: 600; font-size: 0.7rem; border: none; text-decoration: none;
            cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        @media (min-width: 768px) { .apply-btn { padding: 6px 12px; font-size: 0.75rem; } }
        .apply-btn:hover { background-color: #1d4ed8; transform: scale(1.05); color: white;}
        .apply-btn .icon { width: 12px; height: 12px; fill: currentColor; }
        @media (min-width: 768px) { .apply-btn .icon { width: 14px; height: 14px; } }

        /* Utils */
        .edit-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 2px 4px; color: black; font-size: inherit;}
        .sticky-col-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.1); }
        .dark .sticky-col-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body id="main-body" class="bg-gray-100">
    <div id="root"></div>

    <script src="engData.js"></script>
    <script src="mgmtData.js"></script>
    <script src="engExams.js"></script>
    <script src="mgmtExams.js"></script>
    <script src="otherExams.js"></script> 
    
    <script type="text/babel" src="logic.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconBuilding = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;

        // --- MAIN COMPONENT ---
        const CollegeApp = () => {
            // Calling the hook from the external logic.js file
            const {
                activeTab, setActiveTab, search, setSearch,
                isEditMode, setIsEditMode, currentDate,
                engData, mgmtData, engExamData, mgmtExamData, otherExamData,
                updateEng, updateMgmt, updateExam, filterList, formatCurrency, formatPkg, 
                sortColleges, sortExams, getLiveStatus, downloadCSV
            } = window.useCollegeLogic(); 

            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const body = document.getElementById('main-body');
                if (isDark) body.classList.add('dark'); 
                else body.classList.remove('dark');
            }, [isDark]);

            const renderCollegeTable = (data, updateFunc) => (
                <div className="overflow-x-auto min-h-[500px] hide-scroll">
                    <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-gray-50 text-[10px] md:text-xs uppercase tracking-wider text-gray-600 border-b-2 border-gray-200">
                                <th className="p-2 md:p-4 font-bold sticky left-0 z-10 w-8 md:w-12 sticky-col-shadow md:shadow-none bg-gray-50">#</th>
                                <th className="p-2 md:p-4 font-bold min-w-[120px] md:min-w-[200px]">
                                    <span className="md:hidden">College</span>
                                    <span className="hidden md:inline">College Name</span>
                                </th>
                                <th className="p-2 md:p-4 font-bold min-w-[80px] md:min-w-[140px]">
                                    <span className="md:hidden">Ent/Reg</span>
                                    <span className="hidden md:inline">Entrance / Reg</span>
                                </th>
                                <th className="p-2 md:p-4 font-bold min-w-[70px] md:min-w-[120px] text-right">Fees</th>
                                <th className="p-2 md:p-4 font-bold min-w-[70px] md:min-w-[120px] text-right">
                                    <span className="md:hidden">Pkg</span>
                                    <span className="hidden md:inline">Avg Pkg</span>
                                </th>
                                <th className="p-2 md:p-4 font-bold w-12 md:min-w-[80px] text-center">Val</th>
                                <th className="p-2 md:p-4 font-bold w-12 md:min-w-[80px] text-center">Pop</th>
                                <th className="p-2 md:p-4 font-bold min-w-[90px] md:min-w-[150px]">
                                    <span className="md:hidden">Loc/Tier</span>
                                    <span className="hidden md:inline">Location & Tier</span>
                                </th>
                                <th className="p-2 md:p-4 font-bold min-w-[150px] md:min-w-[250px]">Notes</th>
                            </tr>
                        </thead>
                        <tbody className="text-xs md:text-sm divide-y divide-gray-100">
                            {data.length === 0 ? (
                                <tr><td colSpan="9" className="text-center p-8 text-gray-500">No data loaded or empty. Check data files.</td></tr>
                            ) : sortColleges(filterList(data)).map((col, index) => (
                                <tr key={col.id} className="hover:bg-blue-50 transition-colors duration-150 bg-white">
                                    <td className="p-2 md:p-4 font-medium text-gray-500 sticky left-0 z-10 sticky-col-shadow md:shadow-none bg-white">{index + 1}</td>
                                    <td className="p-2 md:p-4">
                                        <div className="font-bold text-gray-900">
                                            {isEditMode ? <input className="edit-input" value={col.name || ''} onChange={e => updateFunc(col.id, 'name', e.target.value)} /> : col.name}
                                        </div>
                                    </td>
                                    <td className="p-2 md:p-4">
                                        <div className="font-semibold text-blue-600">
                                            {isEditMode ? <input className="edit-input" value={col.entrance || ''} onChange={e => updateFunc(col.id, 'entrance', e.target.value)} /> : col.entrance}
                                        </div>
                                    </td>
                                    <td className="p-2 md:p-4 text-right font-medium text-red-500 whitespace-nowrap">
                                        {isEditMode ? <input className="edit-input text-right" value={col.fees || ''} onChange={e => updateFunc(col.id, 'fees', e.target.value)} /> : formatCurrency(col.fees)}
                                    </td>
                                    <td className="p-2 md:p-4 text-right font-bold text-green-600 whitespace-nowrap">
                                        {isEditMode ? <input className="edit-input text-right" value={col.package || ''} onChange={e => updateFunc(col.id, 'package', e.target.value)} /> : formatPkg(col.package)}
                                    </td>
                                    <td className="p-2 md:p-4 text-center">
                                        <span className="px-1.5 py-0.5 rounded-full text-[10px] md:text-xs font-bold bg-blue-100 text-blue-800">{col.valScore || '-'}</span>
                                    </td>
                                    <td className="p-2 md:p-4 text-center">
                                        <span className="px-1.5 py-0.5 rounded-full text-[10px] md:text-xs font-bold bg-green-100 text-green-800">{col.popScore || '-'}</span>
                                    </td>
                                    <td className="p-2 md:p-4 text-gray-800">{col.location}</td>
                                    <td className="p-2 md:p-4 text-gray-500 italic">"{col.notes}"</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            const renderExamTable = (data, type) => {
                const filtered = filterList(data);
                const sorted = sortExams(filtered);
                
                return (
                    <div className="overflow-x-auto min-h-[500px] hide-scroll">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-50 text-[10px] md:text-xs uppercase tracking-wider text-gray-600 border-b-2 border-gray-200">
                                    <th className="p-3 md:p-4 font-bold w-20 md:w-32">Status</th>
                                    <th className="p-3 md:p-4 font-bold min-w-[100px] md:min-w-[200px]">
                                        <span className="md:hidden">Exam</span>
                                        <span className="hidden md:inline">Exam Name</span>
                                    </th>
                                    <th className="p-3 md:p-4 font-bold w-20 md:w-32">
                                        <span className="md:hidden">Start</span>
                                        <span className="hidden md:inline">Reg Start</span>
                                    </th>
                                    <th className="p-3 md:p-4 font-bold w-20 md:w-32">
                                        <span className="md:hidden">End</span>
                                        <span className="hidden md:inline">Reg End</span>
                                    </th>
                                    <th className="p-3 md:p-4 font-bold w-20 md:w-32">
                                        <span className="md:hidden">Date</span>
                                        <span className="hidden md:inline">Exam Date</span>
                                    </th>
                                    <th className="p-3 md:p-4 font-bold text-center w-24 md:w-32">Action</th>
                                </tr>
                            </thead>
                            <tbody className="text-xs md:text-sm divide-y divide-gray-100">
                                {data.length === 0 ? (
                                    <tr><td colSpan="6" className="text-center p-8 text-gray-500">No data loaded or empty. Check data files.</td></tr>
                                ) : sorted.map((ex) => {
                                    const statusDetails = getLiveStatus(ex);
                                    return (
                                        <tr key={ex.id} className="hover:bg-blue-50 transition-colors duration-150 bg-white">
                                            <td className="p-3 md:p-4">
                                                <span className={`px-2 py-1 rounded-md text-[9px] md:text-xs font-bold border-0 whitespace-nowrap ${statusDetails.color}`}>
                                                    {statusDetails.label}
                                                </span>
                                            </td>
                                            <td className="p-3 md:p-4 font-bold text-gray-900">
                                                {isEditMode ? <input className="edit-input" value={ex.name || ''} onChange={e => updateExam(ex.id, type, 'name', e.target.value)} /> : ex.name}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-500 font-medium whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.regStart || ''} onChange={e => updateExam(ex.id, type, 'regStart', e.target.value)} /> : ex.regStart}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-800 font-semibold whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.regEnd || ''} onChange={e => updateExam(ex.id, type, 'regEnd', e.target.value)} /> : ex.regEnd}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-600 whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.examDate || ''} onChange={e => updateExam(ex.id, type, 'examDate', e.target.value)} /> : ex.examDate}
                                            </td>
                                            <td className="p-3 md:p-4 text-center">
                                                {isEditMode ? (
                                                    <input className="edit-input" value={ex.link || ''} onChange={e => updateExam(ex.id, type, 'link', e.target.value)} placeholder="Link" />
                                                ) : (
                                                    <a href={`https://${ex.link}`} target="_blank" rel="noreferrer" className="apply-btn">
                                                        <span className="md:hidden">Apply</span>
                                                        <span className="hidden md:inline">Apply Now</span>
                                                        <svg fill="currentColor" viewBox="0 0 24 24" className="icon"><path clipRule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm4.28 10.28a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06l1.72 1.72H8.25a.75.75 0 000 1.5h5.69l-1.72 1.72a.75.75 0 101.06 1.06l3-3z" fillRule="evenodd"></path></svg>
                                                    </a>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-2 md:p-8 flex justify-center items-start">
                    <div className="w-full max-w-7xl neu-card overflow-hidden !p-0 flex flex-col">
                        
                        {/* Header Area */}
                        <div className="p-4 md:p-8 flex flex-col md:flex-row justify-between items-center gap-4 md:gap-6">
                            
                            {/* Title block */}
                            <div className="flex items-center gap-3 w-full justify-center md:w-auto md:justify-start">
                                <IconBuilding className="text-blue-500 w-6 h-6 md:w-8 md:h-8" />
                                <div className="text-center md:text-left">
                                    <h1 className="text-xl md:text-3xl font-bold text-gray-800 tracking-wide">College Database</h1>
                                    <p className="text-gray-500 text-xs md:text-sm mt-0.5 md:mt-1">Top Private Colleges & Exams</p>
                                </div>
                            </div>

                            {/* Controls block */}
                            <div className="flex flex-wrap items-center gap-4 md:gap-6 justify-center w-full md:w-auto">
                                {/* Dark Mode Switch */}
                                <div className="flex items-center gap-2">
                                    <input type="checkbox" id="dark-toggle" className="checkbox" checked={isDark} onChange={() => setIsDark(!isDark)} />
                                    <label htmlFor="dark-toggle" className="checkbox-label shadow-sm">
                                        <span className="text-[8px] md:text-[10px] ml-1">🌙</span>
                                        <span className="text-[8px] md:text-[10px] mr-1">☀️</span>
                                        <span className="ball shadow-md"></span>
                                    </label>
                                </div>

                                {/* Social Icons */}
                                <ul className="social-wrapper">
                                    <a href="https://www.github.com" target="_blank" rel="noreferrer" className="icon github">
                                        <span className="tooltip">GitHub</span>
                                        <svg viewBox="0 0 24 24" height="1.2em" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.011-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.218.694.825.576C20.565 21.795 24 17.298 24 12c0-6.627-5.373-12-12-12"/></svg>
                                    </a>
                                </ul>

                                {/* Action Buttons */}
                                <div className="flex gap-2">
                                    <button onClick={() => setIsEditMode(!isEditMode)} className={`action-btn ${isEditMode ? 'edit' : ''}`}>
                                        {isEditMode ? <><IconCheck /> <span className="hidden md:inline">Done</span></> : <><IconEdit /> <span className="hidden md:inline">Edit</span></>}
                                    </button>
                                    <button onClick={downloadCSV} className="action-btn download">
                                        <IconDownload /> <span className="hidden md:inline">CSV</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Middle Control Bar (Tabs & Search) */}
                        <div className="px-4 md:px-8 pb-4 md:pb-6 flex flex-col-reverse md:flex-row justify-between items-center gap-4">
                            
                            {/* Segmented Tabs Data-Bound Controls */}
                            <div className="flex w-full md:w-auto overflow-x-auto overflow-y-hidden hide-scroll py-2 pl-1 snap-x">
                                <button onClick={() => setActiveTab('eng')} className={`tab-btn left snap-start ${activeTab==='eng' ? 'active' : ''}`}>
                                    <span className="md:hidden">Engg</span><span className="hidden md:inline">Engineering</span>
                                </button>
                                <button onClick={() => setActiveTab('mgmt')} className={`tab-btn middle snap-start ${activeTab==='mgmt' ? 'active' : ''}`}>
                                    <span className="md:hidden">Mgmt</span><span className="hidden md:inline">Management</span>
                                </button>
                                <button onClick={() => setActiveTab('examEng')} className={`tab-btn middle snap-start ${activeTab==='examEng' ? 'active' : ''}`}>
                                    <span className="md:hidden">Eng Exams</span><span className="hidden md:inline">Eng Exams</span>
                                </button>
                                <button onClick={() => setActiveTab('examMgmt')} className={`tab-btn middle snap-start ${activeTab==='examMgmt' ? 'active' : ''}`}>
                                    <span className="md:hidden">Mgmt Exams</span><span className="hidden md:inline">Mgmt Exams</span>
                                </button>
                                <button onClick={() => setActiveTab('examOther')} className={`tab-btn right snap-start ${activeTab==='examOther' ? 'active' : ''}`}>
                                    <span className="md:hidden">Others</span><span className="hidden md:inline">Other Exams</span>
                                </button>
                            </div>

                            {/* Search */}
                            <div className="w-full md:w-auto relative group">
                                <svg className="absolute left-3 top-2.5 h-4 w-4 md:h-5 md:w-5 text-gray-400 z-10 transition duration-300 group-hover:text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                <input
                                    type="text"
                                    placeholder="Search databases..."
                                    className="search-input !pl-9 md:!pl-10 text-sm md:text-base"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* Display Canvas linked to correct Data constants */}
                        <div className="bg-white border-t border-gray-200 flex-grow">
                            {activeTab === 'eng' && renderCollegeTable(engData, updateEng)}
                            {activeTab === 'mgmt' && renderCollegeTable(mgmtData, updateMgmt)}
                            {activeTab === 'examEng' && renderExamTable(engExamData, 'eng')}
                            {activeTab === 'examMgmt' && renderExamTable(mgmtExamData, 'mgmt')}
                            {activeTab === 'examOther' && renderExamTable(otherExamData, 'other')}
                        </div>
                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<CollegeApp />);
        }
    </script>
</body>
</html>
