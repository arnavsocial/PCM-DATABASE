<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam and College Database 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        .tab-active { border-bottom: 4px solid white; font-weight: 700; color: white; }

        .edit-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 2px 4px; color: black; }
        .sticky-col-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.1); }
        .mobile-scroll-x::-webkit-scrollbar { height: 6px; }
        .mobile-scroll-x::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
