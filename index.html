<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Database 2026 - Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat&display=swap");

        body { font-family: "Montserrat", sans-serif; transition: background 0.2s linear; }

        /* Universal Scrollbar Hider to Prevent Jitter */
        .hide-scroll {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .hide-scroll::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* Dark Mode Toggle Switch */
        .checkbox { opacity: 0; position: absolute; }
        .checkbox-label {
            background-color: #111; width: 50px; height: 26px; border-radius: 50px;
            position: relative; padding: 5px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 0;
        }
        .checkbox-label .ball {
            background-color: #fff; width: 22px; height: 22px; position: absolute;
            left: 2px; top: 2px; border-radius: 50%; transition: transform 0.2s linear;
        }
        .checkbox:checked + .checkbox-label .ball { transform: translateX(24px); }

        /* Dark Mode Styling Logic */
        .dark { background-color: #292c35; color: #fff; }
        .dark .bg-white { background-color: #1e2027 !important; border-color: #3f4451 !important; color: #fff; }
        .dark .bg-gray-50 { background-color: #292c35 !important; border-color: #3f4451 !important; }
        .dark .bg-gray-100 { background-color: #22252d !important; border-color: #3f4451 !important; }
        .dark th { color: #a1a1aa !important; }
        .dark td { color: #e4e4e7 !important; border-bottom-color: #3f4451 !important; }
        .dark .text-gray-900, .dark .text-gray-800 { color: #f4f4f5 !important; }
        .dark .text-gray-600, .dark .text-gray-500 { color: #a1a1aa !important; }
        .dark .edit-input { background: #3f4451; color: white; border-color: #52525b; }
        .dark .hover\:bg-blue-50:hover { background-color: #374151 !important; }
        .dark .social-wrapper .icon { background: #3f4451; color: #fff; }

        /* Neumorphic Card Base */
        .neu-card {
            border-radius: 30px;
            background: #e0e0e0;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }
        .dark .neu-card {
            background: #292c35;
            box-shadow: 15px 15px 40px #1c1e24, -15px -15px 40px #363a46;
        }

        /* Animated Search Bar */
        .search-input {
            border: 2px solid transparent; width: 100%; height: 2.5em; padding-left: 0.8em;
            outline: none; overflow: hidden; background-color: #f3f3f3;
            border-radius: 10px; transition: all 0.5s; font-family: inherit;
        }
        .search-input:hover, .search-input:focus {
            border: 2px solid #4a9dec; box-shadow: 0px 0px 0px 7px rgb(74, 157, 236, 20%);
            background-color: white;
        }
        .dark .search-input { background-color: #3f4451; color: white; }
        .dark .search-input:hover, .dark .search-input:focus { background-color: #1e2027; }

        /* Segmented Options Buttons (Neumorphic Tabs) */
        .tab-btn {
            font: inherit; background-color: #f0f0f0; border: 0; color: #242424;
            font-size: 0.95rem; padding: 0.5em 1.5em; text-shadow: 0 0.0625em 0 #fff;
            box-shadow: inset 0 0.0625em 0 0 #f4f4f4, 0 0.0625em 0 0 #efefef,
                0 0.125em 0 0 #ececec, 0 0.25em 0 0 #e0e0e0, 0 0.3125em 0 0 #dedede,
                0 0.375em 0 0 #dcdcdc, 0 0.425em 0 0 #cacaca, 0 0.425em 0.5em 0 #cecece;
            transition: 0.23s ease; cursor: pointer; font-weight: bold; margin: -1px; white-space: nowrap;
        }
        .tab-btn.left { border-top-left-radius: 0.5em; border-bottom-left-radius: 0.5em; }
        .tab-btn.middle { border-radius: 0px; }
        .tab-btn.right { border-top-right-radius: 0.5em; border-bottom-right-radius: 0.5em; }
        .tab-btn:active, .tab-btn.active {
            translate: 0 0.225em; letter-spacing: 0.05em; color: skyblue;
            box-shadow: inset 0 0.03em 0 0 #f4f4f4, 0 0.03em 0 0 #efefef,
                0 0.0625em 0 0 #ececec, 0 0.125em 0 0 #e0e0e0, 0 0.125em 0 0 #dedede,
                0 0.2em 0 0 #dcdcdc, 0 0.225em 0 0 #cacaca, 0 0.225em 0.375em 0 #cecece;
        }
        /* Dark Mode Tab Overrides */
        .dark .tab-btn { background-color: #3f4451; color: #d1d5db; box-shadow: none; text-shadow: none; border: 1px solid #2e323b;}
        .dark .tab-btn.active { color: #60a5fa; background-color: #1e2027; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }

        /* Animated Social Icons */
        .social-wrapper { display: inline-flex; list-style: none; gap: 12px; padding: 0; margin: 0; }
        .social-wrapper .icon {
            position: relative; background: #fff; border-radius: 50%; padding: 8px;
            width: 35px; height: 35px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1); cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55); color: #333;
        }
        .social-wrapper .tooltip {
            position: absolute; top: 0; font-size: 12px; background: #fff; color: #fff;
            padding: 5px 8px; border-radius: 5px; box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap; z-index: 20;
        }
        .social-wrapper .icon:hover .tooltip { top: -40px; opacity: 1; visibility: visible; pointer-events: auto; }
        .social-wrapper .facebook:hover, .social-wrapper .facebook:hover .tooltip { background: #1877F2; color: #fff; }
        .social-wrapper .twitter:hover, .social-wrapper .twitter:hover .tooltip { background: #1DA1F2; color: #fff; }
        .social-wrapper .instagram:hover, .social-wrapper .instagram:hover .tooltip { background: #E4405F; color: #fff; }
        .social-wrapper .github:hover, .social-wrapper .github:hover .tooltip { background: #333; color: #fff; }

        /* Top Action Buttons (Edit/CSV) */
        .action-btn {
            display: flex; align-items: center; gap: 6px; padding: 8px 16px;
            border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, background 0.2s; background-color: #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .action-btn:hover { transform: scale(1.05); }
        .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .action-btn.edit { background-color: #f59e0b; color: #fff; }
        .action-btn.download { background-color: #10b981; }

        /* Uiverse Apply Now Button (For Table Links) */
        .apply-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            padding: 6px 12px; border-radius: 8px; background-color: #2563eb; 
            color: white; font-weight: 600; font-size: 0.75rem; border: none; 
            cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .apply-btn:hover { background-color: #1d4ed8; transform: scale(1.05); }
        .apply-btn .icon { width: 14px; height: 14px; fill: currentColor; }

        /* Utils */
        .edit-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 2px 4px; color: black; }
        .sticky-col-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.1); }
        .dark .sticky-col-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body id="main-body" class="bg-gray-100">
    <div id="root"></div>

    <script src="engData.js"></script>
    <script src="mgmtData.js"></script>
    <script src="engExams.js"></script>
    <script src="mgmtExams.js"></script>
    <script src="otherExams.js"></script> 

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- THE HOOK LOGIC ---
        const useCollegeLogic = () => {
            const [activeTab, setActiveTab] = useState('eng'); 
            const [search, setSearch] = useState('');
            const [isEditMode, setIsEditMode] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());

            const [engData, setEngData] = useState(typeof window.initialEngData !== 'undefined' ? window.initialEngData : []);
            const [mgmtData, setMgmtData] = useState(typeof window.initialMgmtData !== 'undefined' ? window.initialMgmtData : []);
            const [engExamData, setEngExamData] = useState(typeof window.initialEngExams !== 'undefined' ? window.initialEngExams : []);
            const [mgmtExamData, setMgmtExamData] = useState(typeof window.initialMgmtExams !== 'undefined' ? window.initialMgmtExams : []);
            const [otherExamData, setOtherExamData] = useState(typeof window.initialOtherExams !== 'undefined' ? window.initialOtherExams : []);

            useEffect(() => {
                const timer = setInterval(() => setCurrentDate(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            const updateEng = (id, field, val) => setEngData(prev => prev.map(item => item.id === id ? { ...item, [field]: val } : item));
            const updateMgmt = (id, field, val) => setMgmtData(prev => prev.map(item => item.id === id ? { ...item, [field]: val } : item));
            const updateExam = (id, type, field, val) => {
                if (type === 'eng') setEngExamData(prev => prev.map(item => item.id === id ? { ...item, [field]: val } : item));
                else if (type === 'mgmt') setMgmtExamData(prev => prev.map(item => item.id === id ? { ...item, [field]: val } : item));
                else setOtherExamData(prev => prev.map(item => item.id === id ? { ...item, [field]: val } : item));
            };

            const filterList = (list) => {
                if (!list) return [];
                const s = search.toLowerCase();
                return list.filter(item => {
                    return (item.name && item.name.toLowerCase().includes(s)) || 
                           (item.location && item.location.toLowerCase().includes(s)) || 
                           (item.entrance && item.entrance.toLowerCase().includes(s));
                });
            };

            const formatCurrency = (val) => val ? `₹${val} L` : 'N/A';
            const formatPkg = (val) => val ? `₹${val} LPA` : 'N/A';
            const sortColleges = (colleges) => [...colleges].sort((a, b) => (b.popScore || 0) - (a.popScore || 0));

            // EXAM SORTING & STATUS
            const getLiveStatus = (exam) => {
                const today = new Date(currentDate); 
                today.setHours(0,0,0,0);
                const start = new Date(exam.regStart);
                const end = new Date(exam.regEnd);
                
                if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                    return { label: "Date Error", color: "bg-gray-100", priority: 5 };
                }

                start.setHours(0,0,0,0); end.setHours(0,0,0,0);
                const msPerDay = 1000 * 60 * 60 * 24;
                const diffDays = Math.ceil((end.getTime() - today.getTime()) / msPerDay);

                if (today > end) return { label: `Closed`, color: 'bg-gray-200 text-gray-600 border border-gray-300', priority: 4 };
                if (today >= start && diffDays >= 0 && diffDays <= 10) return { label: `Closing in ${diffDays} Days`, color: 'bg-red-100 text-red-700 border border-red-200', priority: 1 };
                if (today >= start && today <= end) return { label: `Opened ${exam.regStart}`, color: 'bg-green-100 text-green-700 border border-green-200', priority: 2 };
                if (today < start) return { label: `Opens ${exam.regStart}`, color: 'bg-blue-100 text-blue-700 border border-blue-200', priority: 3 };
                
                return { label: "Unknown", color: "bg-gray-100", priority: 5 };
            };

            const sortExams = (exams) => {
                return [...exams].sort((a, b) => {
                    const statA = getLiveStatus(a);
                    const statB = getLiveStatus(b);
                    if (statA.priority !== statB.priority) return statA.priority - statB.priority;
                    
                    const startA = new Date(a.regStart).getTime() || 0;
                    const startB = new Date(b.regStart).getTime() || 0;
                    const endA = new Date(a.regEnd).getTime() || Number.MAX_SAFE_INTEGER;
                    const endB = new Date(b.regEnd).getTime() || Number.MAX_SAFE_INTEGER;

                    if (statA.priority === 3) return startA - startB;
                    if (statA.priority === 4) return endB - endA; 
                    return endA - endB;
                });
            };

            const downloadCSV = () => alert("CSV Download Triggered");

            return {
                activeTab, setActiveTab, search, setSearch,
                isEditMode, setIsEditMode, currentDate,
                engData, mgmtData, engExamData, mgmtExamData, otherExamData,
                updateEng, updateMgmt, updateExam, filterList, formatCurrency, formatPkg, sortColleges, sortExams, getLiveStatus, downloadCSV
            };
        };

        // --- ICONS ---
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;

        // --- MAIN COMPONENT ---
        const CollegeApp = () => {
            const {
                activeTab, setActiveTab, search, setSearch,
                isEditMode, setIsEditMode, currentDate,
                engData, mgmtData, engExamData, mgmtExamData, otherExamData,
                updateEng, updateMgmt, updateExam, filterList, formatCurrency, formatPkg, 
                sortColleges, sortExams, getLiveStatus, downloadCSV
            } = useCollegeLogic();

            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const body = document.getElementById('main-body');
                if (isDark) body.classList.add('dark'); 
                else body.classList.remove('dark');
            }, [isDark]);

            // TABLE: COLLEGES
            const renderCollegeTable = (data, updateFunc) => (
                <div className="overflow-x-auto min-h-[500px] hide-scroll">
                    <table className="w-full text-left border-collapse min-w-[800px] md:min-w-full">
                        <thead>
                            <tr className="bg-gray-50 text-xs uppercase tracking-wider text-gray-600 border-b-2 border-gray-200">
                                <th className="p-2 md:p-4 font-bold sticky left-0 z-10 w-10 md:w-12 sticky-col-shadow md:shadow-none bg-gray-50">#</th>
                                <th className="p-2 md:p-4 font-bold min-w-[160px] md:min-w-[200px]">College Name</th>
                                <th className="p-2 md:p-4 font-bold min-w-[120px] md:min-w-[140px]">Entrance / Reg</th>
                                <th className="p-2 md:p-4 font-bold min-w-[100px] md:min-w-[120px] text-right">Fees</th>
                                <th className="p-2 md:p-4 font-bold min-w-[100px] md:min-w-[120px] text-right">Avg Pkg</th>
                                <th className="p-2 md:p-4 font-bold min-w-[60px] md:min-w-[80px] text-center">Val</th>
                                <th className="p-2 md:p-4 font-bold min-w-[60px] md:min-w-[80px] text-center">Pop</th>
                                <th className="p-2 md:p-4 font-bold min-w-[120px] md:min-w-[150px]">Location & Tier</th>
                                <th className="p-2 md:p-4 font-bold min-w-[200px] md:min-w-[250px]">Notes</th>
                            </tr>
                        </thead>
                        <tbody className="text-sm divide-y divide-gray-100">
                            {data.length === 0 ? (
                                <tr><td colSpan="9" className="text-center p-8 text-gray-500">No data loaded or empty. Check data files.</td></tr>
                            ) : sortColleges(filterList(data)).map((col, index) => (
                                <tr key={col.id} className="hover:bg-blue-50 transition-colors duration-150 bg-white">
                                    <td className="p-2 md:p-4 font-medium text-gray-500 sticky left-0 z-10 sticky-col-shadow md:shadow-none bg-white">{index + 1}</td>
                                    <td className="p-2 md:p-4">
                                        <div className="font-bold text-gray-900 text-sm md:text-base">
                                            {isEditMode ? <input className="edit-input" value={col.name || ''} onChange={e => updateFunc(col.id, 'name', e.target.value)} /> : col.name}
                                        </div>
                                    </td>
                                    <td className="p-2 md:p-4">
                                        <div className="font-semibold text-blue-600 text-xs md:text-sm">
                                            {isEditMode ? <input className="edit-input" value={col.entrance || ''} onChange={e => updateFunc(col.id, 'entrance', e.target.value)} /> : col.entrance}
                                        </div>
                                    </td>
                                    <td className="p-2 md:p-4 text-right font-medium text-red-500 whitespace-nowrap">
                                        {isEditMode ? <input className="edit-input text-right" value={col.fees || ''} onChange={e => updateFunc(col.id, 'fees', e.target.value)} /> : formatCurrency(col.fees)}
                                    </td>
                                    <td className="p-2 md:p-4 text-right font-bold text-green-600 whitespace-nowrap">
                                        {isEditMode ? <input className="edit-input text-right" value={col.package || ''} onChange={e => updateFunc(col.id, 'package', e.target.value)} /> : formatPkg(col.package)}
                                    </td>
                                    <td className="p-2 md:p-4 text-center">
                                        <span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-800">{col.valScore || '-'}</span>
                                    </td>
                                    <td className="p-2 md:p-4 text-center">
                                        <span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-800">{col.popScore || '-'}</span>
                                    </td>
                                    <td className="p-2 md:p-4 text-gray-800">{col.location}</td>
                                    <td className="p-2 md:p-4 text-gray-500 italic">"{col.notes}"</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            // TABLE: EXAMS
            const renderExamTable = (data, type) => {
                const filtered = filterList(data);
                const sorted = sortExams(filtered);
                
                return (
                    <div className="overflow-x-auto min-h-[500px] hide-scroll">
                        <table className="w-full text-left border-collapse min-w-[700px] md:min-w-full">
                            <thead>
                                <tr className="bg-gray-50 text-xs uppercase tracking-wider text-gray-600 border-b-2 border-gray-200">
                                    <th className="p-3 md:p-4 font-bold w-32">Status</th>
                                    <th className="p-3 md:p-4 font-bold min-w-[200px]">Exam Name</th>
                                    <th className="p-3 md:p-4 font-bold w-32">Reg Start</th>
                                    <th className="p-3 md:p-4 font-bold w-32">Reg End</th>
                                    <th className="p-3 md:p-4 font-bold w-32">Exam Date</th>
                                    <th className="p-3 md:p-4 font-bold text-center w-32">Action</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-gray-100">
                                {data.length === 0 ? (
                                    <tr><td colSpan="6" className="text-center p-8 text-gray-500">No data loaded or empty.</td></tr>
                                ) : sorted.map((ex) => {
                                    const statusDetails = getLiveStatus(ex);
                                    return (
                                        <tr key={ex.id} className="hover:bg-blue-50 transition-colors duration-150 bg-white">
                                            <td className="p-3 md:p-4">
                                                <span className={`px-2 py-1 rounded-md text-[10px] md:text-xs font-bold border-0 whitespace-nowrap ${statusDetails.color}`}>
                                                    {statusDetails.label}
                                                </span>
                                            </td>
                                            <td className="p-3 md:p-4 font-bold text-gray-900 text-sm md:text-base">
                                                {isEditMode ? <input className="edit-input" value={ex.name || ''} onChange={e => updateExam(ex.id, type, 'name', e.target.value)} /> : ex.name}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-500 font-medium whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.regStart || ''} onChange={e => updateExam(ex.id, type, 'regStart', e.target.value)} /> : ex.regStart}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-800 font-semibold whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.regEnd || ''} onChange={e => updateExam(ex.id, type, 'regEnd', e.target.value)} /> : ex.regEnd}
                                            </td>
                                            <td className="p-3 md:p-4 text-gray-600 whitespace-nowrap">
                                                {isEditMode ? <input className="edit-input" value={ex.examDate || ''} onChange={e => updateExam(ex.id, type, 'examDate', e.target.value)} /> : ex.examDate}
                                            </td>
                                            <td className="p-3 md:p-4 text-center">
                                                {isEditMode ? (
                                                    <input className="edit-input" value={ex.link || ''} onChange={e => updateExam(ex.id, type, 'link', e.target.value)} placeholder="Website Link" />
                                                ) : (
                                                    <a href={`https://${ex.link}`} target="_blank" rel="noreferrer" className="apply-btn">
                                                        Apply
                                                        <svg fill="currentColor" viewBox="0 0 24 24" class="icon"><path clip-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm4.28 10.28a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06l1.72 1.72H8.25a.75.75 0 000 1.5h5.69l-1.72 1.72a.75.75 0 101.06 1.06l3-3z" fill-rule="evenodd"></path></svg>
                                                    </a>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex justify-center items-start">
